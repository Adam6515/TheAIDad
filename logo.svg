<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>

  <!-- Glow effect -->
  <circle cx="200" cy="185" r="130" fill="url(#glowGrad)"/>

  <!-- Circuit lines - decorative -->
  <g stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.25" fill="none">
    <!-- Top left circuit -->
    <polyline points="60,90 90,90 90,70 120,70"/>
    <circle cx="60" cy="90" r="3" fill="#f59e0b" fill-opacity="0.4"/>
    <circle cx="120" cy="70" r="3" fill="#f59e0b" fill-opacity="0.4"/>
    <!-- Top right circuit -->
    <polyline points="340,90 310,90 310,70 280,70"/>
    <circle cx="340" cy="90" r="3" fill="#f59e0b" fill-opacity="0.4"/>
    <circle cx="280" cy="70" r="3" fill="#f59e0b" fill-opacity="0.4"/>
    <!-- Bottom left circuit -->
    <polyline points="60,310 90,310 90,330 120,330"/>
    <circle cx="60" cy="310" r="3" fill="#f59e0b" fill-opacity="0.4"/>
    <circle cx="120" cy="330" r="3" fill="#f59e0b" fill-opacity="0.4"/>
    <!-- Bottom right circuit -->
    <polyline points="340,310 310,310 310,330 280,330"/>
    <circle cx="340" cy="310" r="3" fill="#f59e0b" fill-opacity="0.4"/>
    <circle cx="280" cy="330" r="3" fill="#f59e0b" fill-opacity="0.4"/>
  </g>

  <!-- Outer ring accent -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="8 6"/>

  <!-- "AI" main text -->
  <text
    x="200"
    y="218"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-weight="900"
    font-size="148"
    letter-spacing="-4"
    fill="#f59e0b"
    filter="url(#glow)"
  >AI</text>

  <!-- Horizontal divider line -->
  <line x1="112" y1="248" x2="288" y2="248" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- "DAD" subtext -->
  <text
    x="200"
    y="290"
    text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-weight="700"
    font-size="38"
    letter-spacing="14"
    fill="#f59e0b"
    fill-opacity="0.9"
  >DAD</text>

  <!-- Small dot accents on divider -->
  <circle cx="112" cy="248" r="3" fill="#f59e0b" fill-opacity="0.6"/>
  <circle cx="288" cy="248" r="3" fill="#f59e0b" fill-opacity="0.6"/>
</svg>
